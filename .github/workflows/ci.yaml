name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # pin@v5
        with:
          go-version: '1.24'
          # see https://github.com/actions/setup-go?tab=readme-ov-file#caching-dependency-files-and-build-outputs
          cache-dependency-path: |
            go.sum
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v4
        with:
          persist-credentials: false
      - name: Get dependencies
        run: go mod download
      - name: Build
        run: make
      - name: Run Unit-Tests
        run: make test
      - name: Archive code coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@v7.0.1
        with:
          name: code-coverage
          path: cover.out
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v4
        with:
          persist-credentials: false
      - name: Download Coverage Report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          name: code-coverage
      - name: Print Coverage
        run: |
          echo "Code coverage report:"
          go tool cover -func=cover.out
      - name: Check Coverage Threlshold
        env:
          COVERAGE_THRESHOLD: 70
        run: |
          echo "Checking if test coverage is above threshold..."
          echo "Threlshold: $COVERAGE_THRESHOLD%"
          totalCoverage=$(go tool cover -func=cover.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total project's coverage: $totalCoverage%"
          if (( $(echo "$totalCoverage $COVERAGE_THRESHOLD" | awk '{print ($1 >= $2)}') )); then
            echo "OK"
          else
            echo "Current total test coverage is below the projects threshold."
            echo "Please add more tests."
            exit 1
          fi
