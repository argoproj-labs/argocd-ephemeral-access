apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: backend
    {{- include "chart.labels" . | nindent 4 }}
  name: backend
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8888
  - name: metrics
    port: 8091
    protocol: TCP
    targetPort: 8091
  selector:
    app.kubernetes.io/component: backend
