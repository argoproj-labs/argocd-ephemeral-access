- apiGroups:
  - ephemeral-access.argoproj-labs.io
  resources:
  - roletemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ephemeral-access.argoproj-labs.io
  resources:
  - roletemplates/status
  verbs:
  - get
