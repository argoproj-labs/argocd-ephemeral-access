apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: roletemplate-viewer-role
rules:
- apiGroups:
  - ephemeral-access.argoproj-labs.io
  resources:
  - roletemplates
