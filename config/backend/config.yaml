apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-cm
  labels:
    app.kubernetes.io/name: argocd-ephemeral-access
    app.kubernetes.io/managed-by: kustomize
# data:
#   # Log level for the controller. (Default: info)
#   backend.log.level: info

#   # Log format for the controller. Possible values: 'text', 'json'. (Default: text)
#   backend.log.format: json

#   # The API server port. (Default: 8888)
#   backend.port: '8888'

#   # The address the metric endpoint binds to. (Default: :8091)
#   backend.metrics.port: 8091

#   # Defines the default duration to be used when creating AccessRequests. (Default: 4h)
#   backend.defaultAccessDuration: 4h

#   # service.name attribute reported on every emitted span.
#   # (Default: argocd-ephemeral-access-backend)
#   backend.tracing.serviceName: argocd-ephemeral-access-backend

#   # OTLP/HTTP endpoint for OpenTelemetry traces. When unset, tracing is disabled. (Default: '')
#   # Example: http://otel-collector.observability.svc.cluster.local:4318
#   backend.tracing.endpoint: ''

#   # Disable TLS for the OTLP/HTTP exporter. Use 'true' for collectors reachable
#   # over http:// (e.g. in-cluster). (Default: false)
#   backend.tracing.insecure: 'false'

#   # Comma-separated list of OpenTelemetry propagators used for inbound extraction
#   # and outbound injection of trace context. Supported values: tracecontext,
#   # baggage, b3, b3multi, jaeger, none. (Default: tracecontext,baggage)
#   backend.tracing.propagators: tracecontext,baggage
